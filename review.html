<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review submission confirmation page.">
  <meta name="author" content="Joseph Slaughter">
  <title>Review Submitted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/review.js" defer></script>
</head>
<body>
  <header class="form-header confirmation-header">
    <p class="eyebrow">Submission Complete</p>
    <h1>Review Submitted</h1>
  </header>

  <main class="confirmation-main">
    <section class="confirmation-card">
      <p class="confirmation-message">Your review was submitted successfully.</p>
      <p class="review-count">Reviews completed on this browser: <span id="reviewCount">0</span></p>
      <p><a href="form.html">Submit another review</a></p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> | Joseph Slaughter | United States</p>
    <p id="lastModified"></p>
  </footer>
  <script src="scripts/getdates.js"></script>
</body>
</html>
