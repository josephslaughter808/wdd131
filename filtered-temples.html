<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Filtered temple album with responsive navigation and lazy loaded images.">
  <meta name="author" content="Joseph Slaughter">
  <title>Filtered Temple Album</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/filtered-temples.css">
  <link rel="stylesheet" href="styles/filtered-temples-large.css">
  <script src="scripts/filtered-temples-data.js" defer></script>
  <script src="scripts/filtered-temples.js" defer></script>
</head>
<body>
  <header>
    <div class="header-bar">
      <span class="site-title">Temple Album</span>
      <button id="menuButton" class="menu-button" type="button" aria-expanded="false" aria-controls="primaryNav" aria-label="Open navigation menu">
        &#9776;
      </button>
    </div>
    <nav id="primaryNav" class="navigation">
      <a href="#" data-filter="home">Home</a>
      <a href="#" data-filter="old">Old</a>
      <a href="#" data-filter="new">New</a>
      <a href="#" data-filter="large">Large</a>
      <a href="#" data-filter="small">Small</a>
      <a href="#" data-filter="announced">Announced</a>
    </nav>
  </header>

  <main>
    <h1 id="pageTitle">Home</h1>
    <p id="templeCount"></p>
    <div id="activeFilterBar" class="active-filter-bar" hidden></div>
    <div id="templeCards" class="card-grid"></div>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> | Joseph Slaughter | United States</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
